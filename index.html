<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Even Partnerships Dashboard</title>
<style>
  :root{--navy:#1F3864;--teal:#2E7D6F;--light:#EAF1F5;--amber:#FFF2CC;--ink:#1a2233;--muted:#6b7688;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:var(--ink);background:#f5f7fa}
  header{background:linear-gradient(120deg,var(--navy),var(--teal));color:#fff;padding:22px 28px}
  header h1{margin:0;font-size:22px}
  header p{margin:4px 0 0;opacity:.85;font-size:13px}
  .updated{margin:10px 0 0;font-size:12px;font-weight:600;background:rgba(255,255,255,.16);display:inline-block;padding:5px 12px;border-radius:20px;letter-spacing:.2px}
  .updated .dot{color:#8fe3c4}
  .wrap{max-width:1400px;margin:0 auto;padding:20px 24px 60px}
  .cards{display:flex;flex-wrap:wrap;gap:12px;margin:18px 0}
  .card{background:#fff;border-radius:12px;padding:14px 18px;min-width:120px;flex:1;box-shadow:0 1px 3px rgba(20,40,80,.08);border-top:3px solid var(--teal)}
  .card .n{font-size:26px;font-weight:700;color:var(--navy)}
  .card .l{font-size:12px;color:var(--muted);margin-top:2px}
  .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:14px 0}
  .controls input,.controls select{padding:8px 10px;border:1px solid #d3dae4;border-radius:8px;font-size:13px;background:#fff}
  .controls input[type=text]{min-width:220px}
  .tablewrap{overflow-x:auto;border-radius:12px;box-shadow:0 1px 3px rgba(20,40,80,.08)}
  table{width:100%;border-collapse:collapse;background:#fff}
  th{background:var(--navy);color:#fff;font-size:11.5px;text-align:left;padding:10px 10px;position:sticky;top:0}
  td{padding:9px 10px;border-bottom:1px solid #eef1f5;font-size:12.5px;vertical-align:top}
  tr:hover td{background:#f8fbfd}
  .seg{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600;background:var(--light);color:var(--navy);white-space:nowrap}
  a{color:#0563C1;text-decoration:none}a:hover{text-decoration:underline}
  .badge{display:inline-block;padding:5px 10px;border-radius:16px;font-size:11.5px;font-weight:600;color:#333;white-space:nowrap}
  .bpres{display:inline-block;padding:4px 9px;border-radius:14px;font-size:10.5px;font-weight:700;white-space:nowrap;cursor:default}
  .bpres.yes{background:#c6efce;color:#0a7d3b}.bpres.partial{background:#ffe49c;color:#8a6d00}.bpres.no{background:#f8cbad;color:#a12a1a}
  .notes{font-size:11px;line-height:1.55;min-width:300px;max-width:420px}
  .notes b{color:var(--navy)}
  .email{font-size:11.5px;color:var(--teal)}
  .muted{color:var(--muted);font-style:italic}
  .reset{background:none;border:1px solid #d3dae4;color:var(--muted);padding:8px 12px;border-radius:8px;font-size:12px;cursor:pointer}
</style>
</head>
<body>
<header>
  <h1>Even — Health Partnerships Dashboard</h1>
  <p>Live view of the partnerships pipeline, synced from the team Google Sheet.</p>
  <p class="updated" id="lastUpdated"><span class="dot">●</span> Loading…</p>
</header>
<div class="wrap">
  <div class="cards" id="cards"></div>

  <div class="controls">
    <input type="text" id="search" placeholder="Search company, POC, tie-up…">
    <select id="fSeg"><option value="">All segments</option></select>
    <select id="fStage"><option value="">All stages</option></select>
    <button class="reset" onclick="load()">↻ Refresh now</button>
  </div>

  <div class="tablewrap">
  <table id="tbl">
    <thead><tr>
      <th>Company</th><th>Segment</th><th>HQ</th><th>Funding</th>
      <th>POC</th><th>Title</th><th>Location</th><th>LinkedIn</th><th>Email</th>
      <th style="min-width:120px">Stage</th><th style="min-width:100px">Bangalore</th>
      <th style="min-width:320px">Existing tie-ups · services · pricing</th>
    </tr></thead>
    <tbody id="body"></tbody>
  </table>
  </div>
</div>

<script>
const STAGES=["Not started","Connection sent","Message sent","Email sent","Revert received","Meeting scheduled","In discussion","Won","Not interested"];
const STAGE_COLOR={"Not started":"#e6e9ee","Connection sent":"#fff2cc","Message sent":"#ffe49c","Email sent":"#ffd98a","Revert received":"#bdd7ee","Meeting scheduled":"#c6efce","In discussion":"#bdd7ee","Won":"#a9e5b8","Not interested":"#f8cbad"};
const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSAc0wongfEVgyNWNt0HWnmy7FnmozrwVU1C7HGuEJSM1aqPKgoQgTF5X8y1gionRxUeBkxbLt2l4Vx/pub?gid=994888042&single=true&output=csv";
let rows=[];

// Fallback snapshot — used only if the live sheet fetch fails
const FALLBACK=[
 ["Orange Health Labs","Diagnostics & Labs","Bengaluru","Series B (~$50M)","Ayman Ahmed","Partnerships @ Orange Health Labs","Bengaluru","https://www.linkedin.com/in/aymansyed/"],
 ["Orange Health Labs","Diagnostics & Labs","Bengaluru","Series B (~$50M)","Nipun Gupta","Associate Director - Partnerships","Delhi NCR","https://www.linkedin.com/in/nipun-gupta-07a462b3/"],
 ["Redcliffe Labs","Diagnostics & Labs","Noida (Delhi NCR)","Series B ($61M)","Shivam Gupta","Brand Partnership Executive","Delhi NCR","https://www.linkedin.com/in/shivamgupta30sg/"],
 ["Metropolis Healthcare","Diagnostics & Labs","Mumbai (pan-India)","Listed","Saurabh Sonar","Corporate Sales / Strategic Partnerships","Mumbai","https://www.linkedin.com/in/saurabh-sonar-72a1b822/"],
 ["Thyrocare (PharmEasy)","Diagnostics & Labs","Navi Mumbai / Bengaluru","Part of PharmEasy","Piyush Singh","Vice President at Thyrocare","Bengaluru","https://www.linkedin.com/in/piyushsingh16/"],
 ["Healthians","Diagnostics & Labs","Gurugram","Series C","Vishal Bhardwaj","Senior Manager - Corporate Sales","Gurugram","https://www.linkedin.com/in/vishal-bhardwaj-b11771231/"],
 ["5C Network","Diagnostics / Radiology","Bengaluru","Series A","Puja Kalita","Regional Sales Manager @ 5C Network","Bengaluru","https://www.linkedin.com/in/puja-kalita-36372516b/"],
 ["Tata 1mg","Pharmacy & ePharmacy","Gurugram (Tata Digital)","Tata-owned","Priyansh Agarwal","AVP - D2C Brand","Delhi NCR","https://www.linkedin.com/in/priyansh-agarwal-772630107/"],
 ["Tata 1mg","Pharmacy & ePharmacy","Gurugram (Tata Digital)","Tata-owned","Himanshu Ratra","Brand Partnerships / Key Accounts","Gurugram","https://www.linkedin.com/in/himanshu-ratra-3b724714a/"],
 ["Truemeds","Pharmacy & ePharmacy","Mumbai (Bengaluru hub)","Series C ($114M)","Vimalpreet Kaur Bajwa","Director - Key Accounts & Partnerships","Mumbai","https://www.linkedin.com/in/vimalpreet-kaur-bajwa-1316ba18/"],
 ["MediBuddy","Pharmacy / Integrated care","Bengaluru","Series C ($125M)","Chetan Neswankar","Director - Strategic Partnerships","Mumbai","https://www.linkedin.com/in/chetan-neswankar-28607542/"],
 ["MediBuddy","Pharmacy / Integrated care","Bengaluru","Series C ($125M)","Lavanya Veluru","Brand Marketing & Strategic Partnerships","Bengaluru","https://www.linkedin.com/in/lavanya-veluru-765219218/"],
 ["Clinikk","Primary Care & Clinics","Bengaluru","Series A (~$10M)","Sumit Saini","AVP - Alliance & Partnerships","Gurugram","https://www.linkedin.com/in/sumit-saini-59185193/"],
 ["ekincare","Primary Care / Corp Health","Hyderabad","Series C","Althaf Moideen","Partnerships & Growth (verify employer)","Bengaluru","https://www.linkedin.com/in/althaf-moideen/"],
 ["Practo","Primary Care / Teleconsult","Bengaluru","Late stage ($232M)","","(POC to be identified)","",""],
 ["HealthPlix","Primary Care / EMR","Bengaluru","Series C ($23M)","","(POC to be identified)","",""],
 ["Plum","Insurtech / Health Benefits","Bengaluru","Series B","Diya Patel","Partnerships at Plum","Bengaluru","https://www.linkedin.com/in/diya-patel-2743481aa/"],
 ["Onsurity","Insurtech / Health Benefits","Bengaluru","~$72M raised","Varun Tandon","Head of Partnerships","Mumbai","https://www.linkedin.com/in/varun-tandon-74097021/"],
 ["Onsurity","Insurtech / Health Benefits","Bengaluru","~$72M raised","Ashwin Gupta","Operations & Partnerships","Bengaluru","https://www.linkedin.com/in/ashwin-gupta-393393193/"],
 ["Onsurity","Insurtech / Health Benefits","Bengaluru","~$72M raised","Bheru Jain","Associate Director - Strategic Partnerships & Alliances","Bengaluru","https://www.linkedin.com/in/bheru-jain-95b214105/"],
 ["Nova Benefits","Insurtech / Health Benefits","Bengaluru","Series A","Noor Alam","GM - Sales & Retention","Bengaluru","https://www.linkedin.com/in/nooralam1405/"],
 ["Kenko Health","Insurtech / OPD plans","Mumbai","Series A ($12M)","","(verify — reportedly wound down)","",""],
 ["Portea Medical","Home Healthcare","Bengaluru","Late stage","","(POC to be identified)","",""],
 ["mfine","Teleconsult / Integrated","Bengaluru","Series C","","(POC to be identified)","",""]
];

function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;")}

function parseCSV(text){
  const out=[];let i=0,f="",row=[],q=false;
  while(i<text.length){const c=text[i];
    if(q){if(c==='"'){if(text[i+1]==='"'){f+='"';i+=2;continue;}q=false;i++;continue;}f+=c;i++;continue;}
    if(c==='"'){q=true;i++;continue;}
    if(c===','){row.push(f);f="";i++;continue;}
    if(c==='\n'){row.push(f);out.push(row);row=[];f="";i++;continue;}
    if(c==='\r'){i++;continue;}
    f+=c;i++;
  }
  if(f.length||row.length){row.push(f);out.push(row);}
  return out;
}
function rowsFromCSV(text){
  const arr=parseCSV(text).filter(r=>r.length>1);
  if(arr.length<2)return[];
  const hdr=arr[0].map(h=>h.trim().toLowerCase());
  const idx=n=>hdr.findIndex(h=>h.startsWith(n));
  const iC=idx("company"),iSeg=idx("segment"),iHQ=idx("hq"),iFund=idx("funding"),
    iPoc=idx("poc name"),iTitle=idx("title"),iLink=idx("linkedin"),iLoc=idx("poc location"),
    iEmail=idx("email"),iStage=idx("stage"),iBang=idx("bangalore"),iTie=idx("existing tie"),
    iServ=idx("services"),iPrice=idx("public pricing");
  const res=[];
  for(let k=1;k<arr.length;k++){const r=arr[k];
    if(!((r[iC]||"").trim()))continue;
    res.push({company:(r[iC]||"").trim(),segment:(r[iSeg]||"").trim(),hq:(r[iHQ]||"").trim(),funding:(r[iFund]||"").trim(),
      poc:(r[iPoc]||"").trim(),title:(r[iTitle]||"").trim(),linkedin:(r[iLink]||"").trim(),loc:(r[iLoc]||"").trim(),
      email:(r[iEmail]||"").trim(),stage:((r[iStage]||"").trim()||"Not started"),
      bangalore:iBang>=0?(r[iBang]||"").trim():"",tieups:iTie>=0?(r[iTie]||"").trim():"",
      services:iServ>=0?(r[iServ]||"").trim():"",pricing:iPrice>=0?(r[iPrice]||"").trim():""});
  }
  return res;
}
function fallbackRows(){
  const C=["company","segment","hq","funding","poc","title","loc","linkedin"];
  return FALLBACK.map(a=>{const o={};C.forEach((c,j)=>o[c]=a[j]);o.email="";o.stage="Not started";o.bangalore="";o.tieups="";o.services="";o.pricing="";return o;});
}
function populateFilters(){
  while(fSeg.options.length>1)fSeg.remove(1);
  while(fStage.options.length>1)fStage.remove(1);
  [...new Set(rows.map(r=>r.segment))].filter(Boolean).sort().forEach(s=>fSeg.insertAdjacentHTML("beforeend",`<option>${esc(s)}</option>`));
  STAGES.forEach(s=>fStage.insertAdjacentHTML("beforeend",`<option>${s}</option>`));
}
function render(){
  const q=search.value.toLowerCase(),fs=fSeg.value,fst=fStage.value;
  const body=document.getElementById("body");body.innerHTML="";
  rows.filter(r=>{
    const st=r.stage||"Not started";
    if(fs&&r.segment!==fs)return false;
    if(fst&&st!==fst)return false;
    if(q&&!((r.company+r.poc+r.title+r.segment+r.tieups).toLowerCase().includes(q)))return false;
    return true;
  }).forEach(r=>{
    const st=r.stage||"Not started";
    const li=r.linkedin?`<a href="${esc(r.linkedin)}" target="_blank">Profile ↗</a>`:'<span class="muted">—</span>';
    const em=r.email?`<span class="email">${esc(r.email)}</span>`:'<span class="muted">—</span>';
    const poc=r.poc?esc(r.poc):'<span class="muted">find POC</span>';
    const bp=r.bangalore||"";
    const bpc=/^no/i.test(bp)?"no":/^partial/i.test(bp)?"partial":/^yes/i.test(bp)?"yes":"";
    const bcell=bp?`<span class="bpres ${bpc}" title="${esc(bp)}">${esc(bp.split("—")[0].trim())}</span>`:'<span class="muted">—</span>';
    const notes='<div class="notes">'+
      (r.tieups?'<b>Tie-ups:</b> '+esc(r.tieups)+'<br>':'')+
      (r.services?'<b>Services:</b> '+esc(r.services)+'<br>':'')+
      (r.pricing?'<b>Pricing:</b> '+esc(r.pricing):'')+'</div>';
    body.insertAdjacentHTML("beforeend",`<tr>
      <td><b>${esc(r.company)}</b></td>
      <td><span class="seg">${esc(r.segment)}</span></td>
      <td>${esc(r.hq)}</td><td>${esc(r.funding)}</td>
      <td>${poc}</td><td>${esc(r.title)}</td><td>${esc(r.loc)||'—'}</td>
      <td>${li}</td><td>${em}</td>
      <td><span class="badge" style="background:${STAGE_COLOR[st]||'#e6e9ee'}">${esc(st)}</span></td>
      <td>${bcell}</td>
      <td>${(r.tieups||r.services||r.pricing)?notes:'<span class="muted">—</span>'}</td>
    </tr>`);
  });
  renderCards();
}
function renderCards(){
  const c=s=>rows.filter(r=>(r.stage||"Not started")===s).length;
  const companies=new Set(rows.map(r=>r.company)).size;
  const pocs=rows.filter(r=>r.linkedin).length;
  const reached=rows.filter(r=>{const s=r.stage||"Not started";return s!=="Not started"&&s!=="";}).length;
  const cards=[["Companies",companies],["POCs identified",pocs],["Reached out",reached],
    ["Reverts",c("Revert received")],["Meetings",c("Meeting scheduled")],["Won",c("Won")]];
  document.getElementById("cards").innerHTML=cards.map(x=>`<div class="card"><div class="n">${x[1]}</div><div class="l">${x[0]}</div></div>`).join("");
}
function setUpdated(live){
  const p=new Intl.DateTimeFormat("en-GB",{timeZone:"Asia/Kolkata",weekday:"short",day:"numeric",month:"short",year:"numeric",hour:"numeric",minute:"2-digit",hour12:true}).formatToParts(new Date());
  const o={};p.forEach(x=>o[x.type]=x.value);
  const t=o.weekday+", "+o.day+" "+o.month+" "+o.year+", "+o.hour+":"+o.minute+" "+((o.dayPeriod||"").toUpperCase())+" IST";
  const el=document.getElementById("lastUpdated");
  el.innerHTML=live?'<span class="dot">●</span> Live from Google Sheet · synced '+t
    :'<span class="dot" style="color:#ffd479">●</span> Saved snapshot (live sync unavailable) · '+t;
}
[search,fSeg,fStage].forEach(el=>el.addEventListener("input",render));
async function load(){
  try{
    const r=await fetch(CSV_URL,{cache:"no-store"});
    if(!r.ok)throw new Error("HTTP "+r.status);
    const parsed=rowsFromCSV(await r.text());
    if(!parsed.length)throw new Error("empty");
    rows=parsed;populateFilters();render();setUpdated(true);
  }catch(e){
    rows=fallbackRows();populateFilters();render();setUpdated(false);
  }
}
load();
</script>
</body>
</html>
